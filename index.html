<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wang Weize | Net-Gayo Real Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #FFD700; font-family: 'Fira Code', monospace; }
        .neon-border { border: 2px solid #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        #speedMeter { transition: all 0.5s ease; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="font-orbitron text-3xl font-black mb-2 uppercase">Wang Dynasty</h1>
            <p class="text-xs tracking-widest text-green-500">> NET-GAYO REAL-TIME ANALYTICS <</p>
        </header>

        <div class="neon-border bg-black/50 p-6 rounded-xl mb-6 text-center">
            <div class="text-gray-400 text-xs mb-2 uppercase">Network Latency (Ping)</div>
            <div id="pingVal" class="text-6xl font-orbitron font-black text-white">--</div>
            <div class="text-xs mt-2 text-green-600">> Server: Google DNS (8.8.8.8)</div>
        </div>

        <div class="neon-border bg-black/50 p-6 rounded-xl text-center">
            <div class="text-gray-400 text-xs mb-2 uppercase">Real Download Speed</div>
            <div id="speedVal" class="text-6xl font-orbitron font-black text-cyan-400">0.0</div>
            <div class="text-sm font-bold text-cyan-700">Mbps</div>
            
            <button onclick="runSpeedTest()" id="testBtn" class="mt-8 w-full bg-yellow-600 text-black font-black py-4 rounded-lg hover:bg-yellow-400 transition-all uppercase tracking-widest">
                🚀 Mulai Speed Test
            </button>
        </div>

        <div class="mt-10 p-4 border-t border-yellow-900/50">
            <div class="flex justify-between text-[10px] text-yellow-800">
                <span>SSID: net-gayo</span>
                <span>GATEWAY: 192.168.1.1</span>
            </div>
        </div>
    </div>

    <script>
        // 1. REAL PING CHECK
        function checkPing() {
            const start = Date.now();
            fetch('https://fonts.googleapis.com/css2?family=Orbitron', { mode: 'no-cors' })
                .then(() => {
                    const delta = Date.now() - start;
                    document.getElementById('pingVal').innerText = delta + 'ms';
                    document.getElementById('pingVal').style.color = delta < 100 ? '#00ff00' : (delta < 200 ? '#ffff00' : '#ff0000');
                });
        }
        setInterval(checkPing, 3000); // Update ping tiap 3 detik

        // 2. REAL SPEED TEST (Simulasi Download File 5MB)
        async function runSpeedTest() {
            const btn = document.getElementById('testBtn');
            const speedDisp = document.getElementById('speedVal');
            
            btn.disabled = true;
            btn.innerText = "SEDANG MENGHITUNG...";
            speedDisp.innerText = "0.0";

            // Link file sampel 5MB (Bisa diganti file beneran di hosting lu)
            const imageAddr = "https://upload.wikimedia.org/wikipedia/commons/3/3a/A_very_large_image_of_a_cloud.jpg?cache=" + Math.random();
            const downloadSize = 5000000; // Estimasi 5MB dalam bytes

            const startTime = new Date().getTime();
            
            try {
                const response = await fetch(imageAddr);
                const reader = response.body.getReader();
                let loaded = 0;

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    loaded += value.length;
                    
                    // Hitung speed progresif
                    const duration = (new Date().getTime() - startTime) / 1000;
                    const bitsLoaded = loaded * 8;
                    const speedBps = bitsLoaded / duration;
                    const speedMbps = (speedBps / 1024 / 1024).toFixed(1);
                    speedDisp.innerText = speedMbps;
                }

                btn.innerText = "TEST SELESAI!";
                btn.style.background = "#00ff00";
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = "🚀 MULAI LAGI";
                    btn.style.background = "#ca8a04";
                }, 3000);

            } catch (e) {
                speedDisp.innerText = "ERR";
                btn.innerText = "BONCOS! KONEKSI ERROR";
                btn.disabled = false;
            }
        }

        // Jalankan ping pertama kali
        checkPing();
    </script>
</body>
</html>
